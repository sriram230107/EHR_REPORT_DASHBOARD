<!DOCTYPE html>

<html>

    <head>

        <title>
            doctors dashboard
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">

    </head>

    <body>

        <a href="/add_patient" class="btn btn-success mb-3">
            Add Patient
        </a>
        <a href="/search_patient" class="btn btn-primary mb-3">
            Search Patient
        </a>

        <div class="container">

        <h1 class="text-center mb-3">
            welcome Dr.{{username}}
        </h1>

        <h2 class="text-center mb-3">
            PATIENT LIST :
        </h2>

        {% for patient in patients %}

        <div class="card rounded p-3 mb-3">

            <div class="row">

                <div class="col-12">

                    <p class="mb-2">
                        Patient ID : {{patient[0]}}
                    </p>

                </div>

            </div>

            <div class="row mt-2">

                <div class="col-12">

                    <p class="mb-2">
                        Patient Name : {{patient[1]}} {{patient[2]}}
                    </p>

                </div>

            </div>

            <div class="row mt-2">

                <div class="col-6">

                    <p class="mb-2">
                        Gender : {{patient[3]}}
                    </p>

                </div>

                <div class="col-6">

                    <p class="mb-2">
                        Blood Group : {{patient[8]}}
                    </p>

                </div>

            </div>
            <div class="row mt-3">

                <div class="col-12 text-center">

                    <a href="/edit_patient/{{patient[0]}}" class="btn btn-warning me-2">
                        Edit
                    </a>

                    <a href="/delete_patient/{{patient[0]}}" class="btn btn-danger"onclick="return confirm('Are you sure you want to delete this patient?');">

                        Delete

                    </a>
                    <a href="/medical_history/{{patient[0]}}" class="btn btn-success">

                        Medical History

                    </a>
                    <a href="/add_record/{{patient[0]}}" class="btn btn-primary">

                        Add New Record

                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

        </div>

        <div class="text-center">
            <a href="/logout" class="btn btn-primary text-center mb-3">
                LOGOUT
            </a>
        </div>

    </body>

</html>
