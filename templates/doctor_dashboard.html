<!DOCTYPE html>

<html>

    <head>

        <title>
            doctors dashboard 
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">

    </head>

    <body>
        <button class="btn btn-success">
            Bootstrap Test
        </button>

        <div class="container">

        <h1 class="text-center mb-3">
            welcome Dr.{{username}}
        </h1>
        
        <h2 class="text-center mb-3">
            PATIENT LIST :
        </h2>

        {% for patient in patients %}

        <div class="card rounded p-3 mb-3">
        <div class="row">

        <div class="col-3">

        <p class="text-center mb-3">
             Patient ID : {{patient[0]}}
        </p>

        </div>

        <div class="col-3">

        <p class="text-center mb-3"> 
            Patient Name : {{patient[1]}} {{patient[2]}}
        </p>

        </div>

        <div class="col-3">

        <p class="text-center mb-3"> 
            Blood Group : {{patient[8]}}
        </p>

        </div>

        <div class="col-3">

        <p class="text-center mb-3">
            Gender : {{patient[3]}}
        </p>

        </div>

        </div>

        {% endfor %}
        </div>

        <div class="text-center">
        <a href="/logout" class="btn btn-primary text-center mb-3">
            LOGOUT
        </a>
        </div>
        </div>
        </div>

    </body>

</html>
