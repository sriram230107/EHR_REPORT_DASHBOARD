<!DOCTYPE html>

<html>

<head>

<title>
Add Medical Record
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body>


<div class="container mt-5 mb-5">


<h1 class="text-center">
Add Medical Record
</h1>


<form action="/add_record/{{patient_id}}" method="POST">
    

<label class="mt-3">
Symptoms
</label>

<textarea
name="symptoms"
class="form-control"
required></textarea>


<label class="mt-3">
Diagnosis
</label>

<input
type="text"
name="diagnosis"
class="form-control"
required>


<label class="mt-3">
Prescription
</label>

<textarea
name="prescription"
class="form-control"
required></textarea>


<label class="mt-3">
Notes
</label>

<textarea
name="notes"
class="form-control"></textarea>


<button
type="submit"
class="btn btn-primary mt-4">

Save Record

</button>


</form>


</div>


</body>

</html>
