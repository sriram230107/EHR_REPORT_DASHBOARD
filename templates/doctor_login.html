<!DOCTYPE html>
<html>
    <head>
        <title> Doctor's Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
    <div class="container mb-5 mt-5">
    <h1>please login to continue</h1>
    <form action="/doctor_login" method="post">
    
    <label for="username" class="text-center mb-3">USERNAME : </label>
    <input type="text" id="username" name="doctor_username" placeholder="Enter username" class="text-center mt-5 mb-3 form-control" required>
    <label for="id" class="text-center mb-3">Doctor's ID : </label>
    <input type="text" id="ID" name="doctor_id" placeholder="Enter id" class="text-center mt-5 mb-3 form-control" required>
    <label for="password" class="text-center mb-3 ">PASSWORD : </label>
    <input type="password" id="password" name="doctor_password" placeholder="Enter password" class="text-center mt-5 mb-3 form-control" required>
    <button type="submit" class="btn btn-primary">LOGIN</button>
    </form>
    </div>
    </body>

</html>
