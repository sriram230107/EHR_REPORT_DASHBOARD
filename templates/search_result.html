<!DOCTYPE html>

<html>

<head>

    <title>
        Search Result
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Patient Details
        </h1>

        <div class="card rounded p-3">

            <div class="row">

                <div class="col-6">

                    <p>
                        <strong>Patient ID :</strong> {{patient[0]}}
                    </p>

                </div>

                <div class="col-6">

                    <p>
                        <strong>Patient Name :</strong> {{patient[1]}} {{patient[2]}}
                    </p>

                </div>

            </div>

            <div class="row">

                <div class="col-6">

                    <p>
                        <strong>Gender :</strong> {{patient[3]}}
                    </p>

                </div>

                <div class="col-6">

                    <p>
                        <strong>DOB :</strong> {{patient[4]}}
                    </p>

                </div>

            </div>

            <div class="row">

                <div class="col-6">

                    <p>
                        <strong>Phone :</strong> {{patient[5]}}
                    </p>

                </div>

                <div class="col-6">

                    <p>
                        <strong>Email :</strong> {{patient[6]}}
                    </p>

                </div>

            </div>

            <div class="row">

                <div class="col-6">

                    <p>
                        <strong>Address :</strong> {{patient[7]}}
                    </p>

                </div>

                <div class="col-6">

                    <p>
                        <strong>Blood Group :</strong> {{patient[8]}}
                    </p>

                </div>

            </div>

        </div>

        <div class="text-center mt-4">

            <a href="/doctor_dashboard" class="btn btn-primary">
                Back to Dashboard
            </a>

        </div>

    </div>

</body>

</html>
